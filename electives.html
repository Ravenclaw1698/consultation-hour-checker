<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BRACU CSE – Elective Courses</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#3b82f6;--primary-dark:#1d4ed8;--primary-light:rgba(59,130,246,0.15);
  --accent:#10b981;--surface:#27272a;--bg:#18181b;
  --text:#f4f4f5;--muted:#a1a1aa;--border:#3f3f46;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --success:#10b981;--success-light:rgba(16,185,129,0.15);
  --danger:#ef4444;--danger-light:rgba(239,68,68,0.15);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── SIDEBAR NAVIGATION ── */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;width:240px;
  background:var(--surface);border-right:1px solid var(--border);
  z-index:900;padding:32px 16px;display:flex;flex-direction:column;
  transition:transform .3s ease;
}
.sidebar-nav{display:flex;flex-direction:column;gap:8px}
.sidebar-link{
  display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;
  font-size:.9rem;font-weight:600;color:var(--muted);text-decoration:none;transition:all .2s;
}
.sidebar-link:hover{color:var(--text);background:rgba(15,23,42,.04)}
.sidebar-link.active{color:var(--primary);background:var(--primary-light)}
.sidebar-link .nav-icon{font-size:1.1rem}

.sidebar-toggle{
  display:flex;position:fixed;top:16px;left:256px;z-index:1000;
  width:40px;height:40px;border-radius:10px;background:var(--surface);
  border:1.5px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.08);
  cursor:pointer;flex-direction:column;justify-content:center;align-items:center;gap:4px;padding:0;
  transition:left .3s ease, transform .2s;
}
.sidebar-toggle span{display:block;width:18px;height:2px;background:var(--text);border-radius:2px;transition:transform .2s,opacity .2s}

/* Collapsed state on desktop */
.sidebar-collapsed .sidebar{transform:translateX(-100%)}
.sidebar-collapsed .main-wrapper-layout{padding-left:0}
.sidebar-collapsed .sidebar-toggle{left:16px}

/* Hamburger animations (primarily mobile when open) */
.sidebar-toggle.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.sidebar-toggle.open span:nth-child(2){opacity:0}
.sidebar-toggle.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}

.sidebar-overlay{
  display:none;position:fixed;inset:0;background:rgba(15,23,42,.3);
  backdrop-filter:blur(4px);z-index:850;opacity:0;transition:opacity .3s ease;pointer-events:none;
}
.sidebar-overlay.show{opacity:1;pointer-events:all}

.main-wrapper-layout{
  padding-left:240px;min-height:100vh;display:flex;flex-direction:column;justify-content:space-between;
  transition:padding-left .3s ease;
}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%);box-shadow:24px 0 80px rgba(0,0,0,.15)}
  .sidebar-toggle{left:16px}
  .main-wrapper-layout{padding-left:0}
  
  .sidebar.open{transform:translateX(0)}
  .sidebar-toggle.open{left:256px}
  .sidebar-overlay{display:block}
}

/* ── HERO ── */
.hero{
  background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 50%,#10b981 100%);
  padding:48px 24px 80px;text-align:center;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.15);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.25);border-radius:100px;
  padding:5px 14px;font-size:.75rem;font-weight:600;color:#f3e8ff;
  letter-spacing:.5px;text-transform:uppercase;margin-bottom:16px;
}
.hero h1{font-size:2rem;font-weight:700;color:#fff;line-height:1.2;margin-bottom:8px}
.hero h1 span{
  background:linear-gradient(90deg,#93c5fd,#34d399);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero p{color:#f3e8ff;font-size:.95rem;font-weight:400}

/* ── SEARCH CARD ── */
.search-card{
  max-width:1100px;margin:-36px auto 0;padding:24px;
  background:var(--surface);border-radius:20px;
  box-shadow:var(--shadow);border:1px solid var(--border);position:relative;z-index:10;
}
.search-label{font-size:.8rem;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.search-row{position:relative}
#search-input{
  width:100%;padding:13px 16px 13px 44px;border:2px solid var(--border);border-radius:12px;
  font-size:.95rem;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;
  color:var(--text);background:#1c1c1f;
}
#search-input:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(59,130,246,.25);background:#27272a}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:1.1rem;pointer-events:none}

/* ── MAIN CONTAINER ── */
.container{max-width:100%;margin:0;padding:32px 40px 60px}

/* ── TABS ── */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px}
.tab-btn{
  padding:12px 24px;font-size:.88rem;font-weight:600;cursor:pointer;
  border:none;background:none;font-family:inherit;color:var(--muted);
  border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;
}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-btn:hover:not(.active){color:var(--text)}

.dir-count{font-size:.82rem;color:var(--muted);margin-bottom:18px}

/* ── ELECTIVES GRID ── */
.electives-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;
}
.elective-card{
  background:var(--surface);border:1.5px solid var(--border);border-radius:12px;
  padding:16px;cursor:pointer;display:flex;flex-direction:column;justify-content:space-between;
  transition:border-color .15s,box-shadow .15s,transform .15s;
}
.elective-card:hover{border-color:var(--primary);box-shadow:var(--shadow);transform:translateY(-2px)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.course-code{
  background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;
  font-size:.75rem;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.3px;
}
.status-pill{
  font-size:.65rem;font-weight:700;padding:2px 6px;border-radius:5px;text-transform:uppercase;
}
.status-pill.active{background:var(--success-light);color:var(--success)}
.status-pill.inactive{background:var(--danger-light);color:var(--danger)}
.course-title{font-size:.88rem;font-weight:700;color:var(--text);line-height:1.35;margin-bottom:10px;flex:1}
.card-details{font-size:.78rem;color:var(--muted);border-top:1px solid var(--border);padding-top:10px;display:flex;flex-direction:column;gap:4px}
.detail-item{display:flex;align-items:center;gap:6px}
.detail-icon{font-size:.8rem;color:var(--primary)}

.dir-empty{text-align:center;color:var(--muted);font-size:.9rem;padding:48px 20px;grid-column:1/-1}

/* ── STATUS ── */
#status{text-align:center;font-size:.88rem;color:var(--muted);margin:24px 0;min-height:1.5em}
#status.error{color:#dc2626}
.spinner{
  width:18px;height:18px;border:2.5px solid #dbeafe;border-top-color:var(--primary);
  border-radius:50%;animation:spin .7s linear infinite;display:inline-block;
  vertical-align:middle;margin-right:6px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,.65);backdrop-filter:blur(4px);
  display:flex;align-items:flex-start;justify-content:center;
  padding:16px;padding-top:8vh;
  overflow-y:auto;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{
  background:var(--surface);border-radius:20px;width:100%;max-width:640px;
  box-shadow:var(--shadow);border:1px solid var(--border);
  transform:translateY(24px) scale(.97);transition:transform .25s;
  position:relative;flex-shrink:0;overflow:hidden;
}
.modal-overlay.open .modal-box{transform:translateY(0) scale(1)}
.modal-close{
  position:absolute;top:14px;right:14px;
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);
  box-shadow:0 2px 8px rgba(0,0,0,.12);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:1rem;line-height:1;transition:background .15s;z-index:20;
  color:var(--text);
}
.modal-close:hover{background:var(--danger-light);color:var(--danger)}

.modal-header{
  background:linear-gradient(135deg,#1e3a8a,#2563eb 60%,#10b981);
  padding:28px;color:#fff;
}
.modal-course-badge{
  display:inline-flex;align-items:center;gap:8px;margin-bottom:8px;
}
.modal-course-code{
  background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);
  padding:4px 10px;border-radius:8px;font-size:.78rem;font-weight:700;letter-spacing:.5px;
}
.modal-course-title{font-size:1.3rem;font-weight:700;line-height:1.3;margin-top:6px}

.modal-body{padding:28px;display:flex;flex-direction:column;gap:20px;max-height:60vh;overflow-y:auto}
.info-section{display:flex;flex-direction:column;gap:6px}
.info-label{font-size:.75rem;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.info-value{font-size:.92rem;color:var(--text);line-height:1.5}
.info-value.empty{color:var(--muted);font-style:italic}

.outline-box{
  background:#1c1c1f;border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.outline-text{font-size:.85rem;font-weight:500}
.outline-btn{
  background:var(--primary);color:#fff;border:none;border-radius:8px;
  padding:6px 12px;font-size:.8rem;font-weight:600;cursor:pointer;text-decoration:none;
  transition:background .15s;
}
.outline-btn:hover{background:var(--primary-dark)}

/* ── FACULTIES LIST ── */
.faculty-list{display:flex;flex-direction:column;gap:10px}
.fac-row{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:10px 14px;background:#1c1c1f;border:1.5px solid var(--border);border-radius:12px;
  cursor:pointer;transition:border-color .15s, transform .15s;
}
.fac-row:hover{
  border-color:var(--primary);
  transform:translateY(-1px);
}
.fac-left{display:flex;align-items:center;gap:12px}
.fac-initial{
  width:36px;height:36px;border-radius:8px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#fff;font-size:.75rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.fac-name{font-size:.85rem;font-weight:600;color:var(--text)}
.email-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:32px;height:32px;border-radius:8px;
  background:rgba(37,99,235,.1);color:var(--primary);text-decoration:none;
  transition:all .15s;font-size:.9rem;
}
.email-btn:hover{background:var(--primary);color:#fff}

@media(max-width:600px){
  .hero h1{font-size:1.4rem}
  .search-card{margin:16px;border-radius:16px;padding:20px}
  .tabs{margin-bottom:14px}
  .tab-btn{padding:10px 16px;font-size:.8rem}
  .electives-grid{grid-template-columns:1fr;gap:12px}
  .modal-overlay{padding:10px;padding-top:4vh}
  .modal-header{padding:20px}
  .modal-body{padding:20px}
}
</style>
</head>

  "CSE391": "A survey of current Internet technologies and state-of-the-art web programming methods. Using client/server structures, topics studied will be drawn from JavaScript, JSP, ASP, Cold Fusion, Flash, Document Object Model, HTML, Cascading Style Sheets, XML, CGI, TCP/IP and the .NET platform. Programming tools may include PERL, various UNIX shell scripts, Windows batch files, Java and other languages as needed.",

  "CSE419": "An introduction to the principles of functional, imperative, and logic programming languages. Topics covered include meta-circular interpreters, semantics (operational and denotational), type systems (polymorphism, inference, and abstract types), object-oriented programming, modules, and multiprocessing; case studies of contemporary programming languages. Programming experience and background in language implementation required.",
  "CSE424": "Introduction to pattern recognition: features, classifications, learning. Statistical methods, structural methods and hybrid method. Applications to speech recognition, remote sensing and biomedical area. Learning algorithms, Syntactic approach: Introduction to pattern grammars and languages. Parsing techniques. Pattern recognition in computer aided design. The course includes a compulsory 3 hour laboratory work alternate week.",
  "CSE425": "An extensive course on neural network architectures and learning algorithms with theory and applications. Temporal and optimal linear associative memories, fuzzy control. Cohen-Grossberg theorem. Unsupervised learning. Higher-order competitive, differential Hebbian learning networks. Supervised learning. Adaptive estimation and stochastic approximation. Adaptive vector quantization, mean-square approach. Kohonen self-organizing maps. Grossberg theory. Simulated annealing. Boltzman and Cauchy learning. Adaptive resonance. Gabor functions and networks.",
  "CSE426": "Graphs and simple graphs, diagraphs, subgraphs, vertex-degrees, walks,, paths and cycles; trees, spanning trees in graphs, distance in graphs; Complementary graphs, cut-vertices, bridges and blocks, k-connected graphs; Euler tours, Hamiltonian cycles, Chinese Postman Problem, Traveling Salesman Problem; Chromatic number, Chromatic polynomials, chromatic index, Vizing's theorem, planar graphs, perfect graphs.",
  "CSE427": "Introduction to machine learning; Supervised and reinforcement learning; Unsupervised learning algorithms; Attribute based and relational supervised learning algorithms; Neural network based learning algorithms; Genetic algorithm and genetic programming; Reinforcement learning algorithms; Computational learning theory.",
  "CSE428": "Digital image fundamentals, perception, representation; image transforms; First Fourier Transform (FFT), Discrete Cosine Transform (DCT), Karhumen and Loeve Transform (KLT), Wavelet transform and sub-band decomposition; image enhancement and restoration techniques, image compression techniques, image compression standards: JPEG, MPEG, H.261, and H.263.",
  "CSE429": "Multimedia System- Introduction; Coding of compression standards; Architecture issues in multimedia; Operating System issues in multimedia- real-time OS issues, synchronization, interrupt handling; Database issues in multimedia- indexing and storing multimedia data, disk placement, disk scheduling, searching for a multimedia document; Networking issues in multimedia- Quality-of service guarantees, resource reservation, traffic specification, happing and monitoring, admission control; Security issues in multimedia- digital water-marking, partial encryption schemes for video streams; Multimedia application- audio and video conferencing, video on demand, voice over IP. Concepts covered in lecture applied in computer laboratory assignments.",
  "CSE430": "Introduction to Digital Signal Processing, Filtering, Frequency response, Sampling theory, Z-transform, Discrete Fourier Transform (DFT), Fast Fourier Transform (FFT), Windowing, Correlation & Convolution, Application of Digital Signal Processing. Introduction to Digital Filters, Finite Impulse Response (FIR), Infinite Impulse Response (IIR), Different techniques of FIR and IIR filter design. MATLAB application to DSP; the course includes a compulsory 3-hour laboratory work each week. (Pre req. CSE 111 and MAT120)",
  "CSE431": "Introduction to the field of natural language processing (NLP)- the creation of computer programs that can understand, generate, and learn natural language. The topics include the three major subfields of NLP: syntax (the structure of an utterance), semantics (the truth-functional meaning of an untterance), and pragmatics/discourse (the context-dependent meaning of an utterance). The course will introduce both knowledge-based and statistical methods for NLP, and will illustrate the use of such methods in a variety of of text- and speech-based application areas.",
  "CSE432": "Introduction to automatic speech recognition, speech understanding and speech synthesis/text-to-speech from the computer science and linguistics perspective. Focus on understanding of key algorithms including noisy channel model, Hidden Markov Models (HMMs), A* and Viterbi decoding, N-gram language modeling, unit selection synthesis, and roles of linguistic knowledge (especially phonetics, intonation, pronunciation variation, disfluencies).",
  "CSE460": "Design and analysis techniques fro VLSI circuits. Design reliable VLSI circuits, noise considerations, design and operation of large fan out and fan in circuits, clocking methodologies, techniques for data path and data control design. Simulation techniques. Parallel processing, spatial purpose architectures in VLSI. VLSI layouts partitioning and placement routing and wiring in VLSI. Reliability aspects of VLSI design. The course includes a compulsory 3 hour laboratory work alternate week.",
  "CSE461": "Design using MSI and LSI components. Design of memory subsystem using SRAM and DRAM. Design of various components of a computer: ALU, memory and control unit: hardwired and micro programmed. Microprocessor based designs. Computer bus standards. Design using special purpose controllers, floppy disk controller. Digital control system. Computes in telecommunication and control. The course includes a compulsory 3 hour laboratory work each week.",
  "CSE462": "Introduction to Fault Tolerant Systems and Architectures. Fault detection and location in combinational and sequential circuits; Fault test generation for combinational and sequential circuits; Digital simulation as a diagnostic tool. Automatic test pattern generator, memory test pattern and reliability. Performance monitoring self checking circuits, Burst error correction and Triple modular redundancy; Maintenance",
  "CSE470": "Concepts of software engineering: requirements definition, modular, structure design, data specifications, functional specifications, verification, documentation, software maintenance, Software support tools. Software project organization, quality assurance, management and communication skills.",
  "CSE471": "Introduces students to tools and techniques in systems analysis and design such as data flow diagram and E-R diagrams. Projects by students where they analyse and design a system using these tools. The course includes a compulsory 3 hour laboratory work each week.",
  "CSE472": "An introduction to the concepts for human and computer interface. The importance of computer interface, interface quality and methods of evaluation. The relationship of interface quality to interactions with the computer. Interface design, dimensions of interface variability, dialogue tools and techniques, user centered design and task analysis. User interface implementation, I/O devices and user interface for groupware, multimedia systems and visualization. Student will have to submit four assignments on multimedia work in the lab.(Pre req. CSE 221)",
  "CSE473": "This course aims in teaching the integration of business and technical consideration in the design, implementation and management of information systems. Topics include: Is planning and development, business, management, executive, and strategic information systems, including case studies of selected large disaster planning and recovery. The course also includes practical examples of information systems industry.",
  "CSE110": "This course would be an introduction to the foundations of computation and purpose of mechanized computation. Emphasis will be placed on techniques of problem analysis and the development of algorithms and programs. Topics will include:",
  "CSE111": "This course would be an introduction to data structures, formal specification of syntax, elements of language theory and mathematical preliminaries. Other topics that would be covered are formal languages, structured programming concepts, survey of features of existing high level languages. Students would design and write application using an appropriate language.",
  "CSE220": "Introduction to widely used and effective methods of data organisation, focussing on data structures, their algorithms and the performance of these algorithms. Concepts and examples, elementary data objects, elementary data structures, arrays, lists, stacks, queues, graphs, trees, compound structures, data abstraction and primitive operations on these structures. memory management; sorting and searching; hash techniques; Introduction to the fundamental algorithms and data structures: recursion, backtrack search, lists, stacks, queues, trees, operation on sets, priority queues, graph dictionary. Introduction to the analysis of algorithms to process the basic structures. A brief introduction to database systems and the analysis of data structure performance and use in these systems. The course includes a compulsory 3 hour laboratory work alternate week.(Pre req. CSE 111)",
  "CSE221": "The study of efficient algorithms and effective algorithm design techniques. Techniques for analysis of algorithms, Methods for the design of efficient algorithms :Divide and Conquer paradigm, Greedy method, Dynamic programming, Backtracking, Basic search and traversal techniques, Graph algorithms, Elementary parallel algorithms, Algebraic simplification and transformations, Lower bound theory, NP-hard and NP-complete problems. Techniques for the design and analysis of efficient algorithms, Emphasising methods useful in practice. sorting; Data structures for sets: Heaps, Hashing; Graph algorithms: Shortest paths, Depth-first search, Network flow, Computational geometry; Integer arithmetic: gcd, primality; polynomial and matrix calculations; amortised analysis; Performance bounds, asymptotic and analysis, worst case and average case behaviour, correctness and complexity. Particular classes of algorithms such as sorting and searching are studied in detail. The course includes a compulsory 3 hour laboratory work alternate week. ( Pre req. CSE 220 )",
  "CSE230": "Set theory, Elementary number theory, Graph theory, Paths and trees, Boolean Algebra, Binary Relations, Functions, Algebraic system, Generating functions, Induction, Reduction, Semigroup, Permutation groups, Discrete Probability, Mathematical logic, Prepositional calculus and Predicate calculus.\n\nSuggested Books:",
  "CSE250": "Fundamental electrical concepts and measuring units. Direct current: voltage, current, resistance and power. Laws of electrical circuits and methods of network analysis; Introduction to magnetic circuits. Alternating current: instantaneous and r.m.s. current, voltage and power, average power for various combinations of R, L and C circuits, phasor representation of sinusoidal quantities. The course includes a compulsory 3 hour laboratory work alternate week.\n(Pre req. PHY 112 or appropriate experience in electronic circuits)\n\nSuggested Books:",
  "CSE251": "Introduction to semiconductors, p-type and n-type semiconductors; p-n junction diode characteristics; Diode applications: half and full wave rectifiers, clipping and clamping circuits, regulated power supply using zener diode.Bipolar Junction Transistor (BJT): principle of operation, I-V characteristics; Transistor circuit configurations (CE, CB, CC), BJT biasing, load lines; BJTs at low frequencies; Hybrid model, h parameters, simplified hybrid model; Small-signal analysis of single and multi-stage amplifiers, frequency response of BJT amplifier. Field Effect Transistors (FET): principle of operation of JFET and MOSFET; Depletion and enhancement type NMOS and PMOS; biasing of FETs; Low and high frequency models of FETs, Switching circuits using FETs; Introduction to CMOS. Operational Amplifiers (OPAMP) : linear applications of OPAMPs, gain, input and output impedances, active filters, frequency response and noise.Introduction to feedback, Oscillators, Silicon Controlled Rectifiers (SCR), TRIAC, DIAC and UJT: characteristics and applications; Introduction to IC fabrication processes. The course includes a compulsory 3 hour laboratory work alternate week.\n(Pre req.: CSE 250)",
  "CSE260": "An introduction to digital systems such as computer, communication and information systems. Topics covered include Boolean algebra, digital logic gates, combinational logic circuits, decoders, encoders, multiplexers. Asynchronous and synchronous counters. Registers, flip-flops, adders, Sequential circuit analysis and design. Simple computer architecture. The course includes a compulsory 3 hour laboratory work each week.",
  "CSE320": "Introduction to purpose and methods of communication. Necessity for modulation and techniques. Technical aspects of data communications. Effects of noise and control. Basic concepts such as fundamental limits, encoding, modulation, multiplexing, error detection and control. Topics include: Data Transmission Protocols, different layers in data communication systems, LANs, WANs linked with telephony. This course will include a compulsory 3-hour laboratory work each week for those interested in obtaining the CCNA certification.",
  "CSE321": "Principles of operating systems: design objects; sequential process; concurrent processes, functional mutual exclusion, processor co-operation and deadlocks, management. Control and scheduling of large information processing systems. Dispatching processor access methods, job control languages memory addressing, paging and store multiplexing, and time sharing, batch processing. Scheduling algorithms, file systems, and security; semaphores and critical sections, device drivers, multiprocessing, sharing, design and implementation methodology, performance evaluation and case studies. The course includes a compulsory 3 hour laboratory work each week.\n(Pre req.: CSE 221)",
  "CSE330": "Computer Arithmetic: floating point representation of numbers, arithmetic operations with normalized floating point numbers; Iterative methods: different iterative methods for finding the roots of an equation and their computer implementation; Solution of simultaneous Algebraic Equations, Gauss elimination; Interpolation, Least square approximation of functions, Taylor series representation, Chebyshev series; Numerical differentiation and integration and Numerical Solution of Differential Equations.\n( Pre req.: MAT 120)",
  "CSE331": "An introduction to finite representation of infinite objects and basic mathematical models of computation. Finite automata and regular languages, pushdown automata and context free languages. Turing machines. Church's Thesis. Partial recursive functions. Undecidability. Reducibility and completeness. Halting problem. Time complexity and NP-completeness. Probabilistic computation. Interactive proof systems. (Pre req.: CSE 221)",
  "CSE340": "A systematic study of the various elements in computer design, including circuit design, storage mechanisms, addressing schemes, and various approaches to parallelism and distributed logic. Information representation and transfer; instruction and data access methods; the control unit; hardware and microprogrammed; memory organisation. RISC and CSEC machines. (Pre req. CSE 260)",
  "CSE341": "Introduction to different types of microprocessors. Microprocessor architecture, instruction set, interfacing/O operation, interrupt structure, DMA. Microprocessor interface ICs. Advanced microprocessor concept of microprocessor based system design.",
  "CSE350": "Diode logic gates, transistor switches, transistor gates, MOS gates, Logic families: TTL, ECL, IIL and CMOS logic with operation details. Propagation delay, product and noise immunity. Open collector and High impedance gates. Electronic circuits for flip flops, counters and register, memory systems. PLA's (A/D, D/A converters with applications, S/H circuits) LED, LCD and optically coupled oscillators. Non-linear applications of OPAMPs. Analog switches. Linear wave shaping: diode wave shaping techniques, clipping and clamping circuits, comparator circuits, switching circuits. Pulse transformers, pulse transmission. Pulse generation:monostable, bistable and stable multivibrations, Timing circuits. Simple voltage sweeps, linear circuit sweeps. Schmitrigger, blocking oscillators and time base circuit. The course includes a compulsory 3 hour laboratory work each week.(Pre req. CSE 251, CSE 260)",
  "CSE370": "Introduction to concepts and methods for storing and manipulating data in stored form. File retrieval and organisation. Database models and designing of database systems. The principles of database management systems. Relational database management systems. Query formulation and language. Database administration. Methods used for the storage, selection and presentation of Data. Database integrity and security. Students will work with database languages and popular application packages. Common database management systems. Structure of SQL and principals behind the design of SQL. Students must complete four SQL assignments in the lab. The course includes a compulsory 3 hour laboratory work each week.",
  "CSE420": "Theory and Practice; An introduction to compiler and interpreter design, with emphasis on practical solutions using compiler writing tools such as Yacc in UNIX, and the C programming language, Topics covered include: lexical scanners, context free languages and pushdown automata, recursive descent parsing, bottom up parsing, attributed grammars, symbol table design, run time memory allocation, machine language, code generation and optimisation. The course includes a compulsory 3 hour laboratory work alternate week.",
  "CSE421": "An introduction to the basics of transport connections and sessions. The protocol hierarchy, design issues in transport and session layer protocol, end-to-end protocols, message handling protocols, terminal and file transfer protocols, Internet TCP/IP protocols. End to end data networks, congestion control networks, wireless networks, mobile computing, high speed networks. Concurrent programming, data link layer, framing and error control, media access control. Models of distributed computation, management and resource control of networks and distributed operating systems, distributed file systems, caching scheduling, process migration. Fault tolerance, network security and privacy, algorithm for deadlock detection. Synchronization and concurrency control in distributed systems. The course includes a compulsory 3-hour laboratory work each week if the student wishes to obtain CCNA certification. Otherwise the course includes a compulsory 3-hour laboratory work alternate week.",
  "CSE422": "Survey of concepts in artificial intelligence. Knowledge representation, search and Control techniques. AI machines and features of LISP and PROLOG languages. Problem Representation; search, constraint propagation, rule chaining, frame inheritance, inference and learning in intelligent systems; systems for general problems solving, game playing, expert consultation, concept formation and natural languages processing; recognition, understanding and translation. Use of heuristic vs. algorithmic programming; cognitive simulations - vs. machine intelligence; study of some expert systems such as robotics and understanding. Solving problems in Al languages. The course includes a compulsory 3 hour laboratory work each week.",
  "CSE423": "Introduction to Graphical data processing. Fundamentals of interactive graphics Architecture of display devices and connectivity to a computer. Implementation of graphics concepts of two dimensional and three dimensional viewing, clipping and transformations. Hidden line algorithms. Raster graphics concepts: Architecture,",
  "CSE474": "Simulation methods, model building, random number generator, statistical analysis of results, validation and verification techniques. Digital simulation of continuous system. Simulation and analytical methods for analysis of computer system and practical problems in business and practice. Introduction to the simulation packages. The course includes a compulsory 3 hour laboratory work alternate week.",
  "CSE490": "The course focuses on advanced IP addressing techniques (Variable Length Subnet Masking [VLSM]), intermediate routing protocols (RIP v2, single-area OSPF, EIGRP), command-line interface configuration of switches, Ethernet switching, Virtual LANs (VLANs), Spanning Tree Protocol (STP), and VLAN Trunking Protocol (VTP). The course will also focus on advanced IP addressing techniques (Network Address Translation [NAT], Port Address Translation [PAT], and DHCP), WAN technology and terminology, PPP, ISDN, DDR, Frame Relay, network management, and introduction to optical networking. The course includes a compulsory 3-hour laboratory work each week if the student wishes to obtain CCNA certification.",
  "CSE491": "For students interested in any of the following ways of studying Computer Science & Engineering: independently exploring an advanced topic under a faculty instructor; conducting significant research under a faculty supervisor; or doing an internship in industry under the supervision of industry and faculty advisors. In each case, the student must first identify a faculty member within the CSE department to oversee his/her work, and then write a proposal to the department chair outlining the means and objectives of the project. The proposal must be approved by the intended faculty supervisor and department chair prior to commencement of the term. At the end of the term, the student must submit a detailed report and/or give a presentation of the results, before the final course grade may be awarded.",

function parseCSV(text){
  const rows = [];
  let i = 0, n = text.length;
  while(i < n){
    const row = [];
    while(i < n && text[i] !== '\n'){
      if(text[i] === '"'){
        i++;
        let cell = '';
        while(i < n){
          if(text[i] === '"' && text[i+1] === '"'){ cell += '"'; i += 2; }
          else if(text[i] === '"'){ i++; break; }
          else cell += text[i++];
        }
        row.push(cell);
        if(i < n && text[i] === ',') i++;
      } else {
        let cell = '';
        while(i < n && text[i] !== ',' && text[i] !== '\n') cell += text[i++];
        row.push(cell);
        if(i < n && text[i] === ',') i++;
      }
    }
    if(i < n && text[i] === '\n') i++;
    if(row.length && row.some(c => c.trim())) rows.push(row);
  }
  return rows;
}

async function fetchSheetData() {
  const statusEl = document.getElementById('status');
  const countEl = document.getElementById('dir-count');
  statusEl.innerHTML = `<span class="spinner"></span>Fetching latest elective course list...`;
  
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}`;
    const r = await fetch(url);
    if(!r.ok) throw new Error('HTTP ' + r.status);
    const rawText = await r.text();
    const rows = parseCSV(rawText);
    
    // Skip header row
    for(let i = 1; i < rows.length; i++) {
      const r = rows[i];
      // Expect course code in r[2], offered state in r[1]
      if (r[2] && r[2].trim()) {
        const initialsStr = (r[7] || '').trim();
        const namesStr = (r[8] || '').trim();
        const emailsStr = (r[9] || '').trim();
        
        const initials = initialsStr ? initialsStr.split(',').map(s => s.trim()).filter(Boolean) : [];
        const names = namesStr ? namesStr.split(',').map(s => s.trim()).filter(Boolean) : [];
        const emails = emailsStr ? emailsStr.split(',').map(s => s.trim()).filter(Boolean) : [];
        
        const faculties = [];
        const maxLen = Math.max(initials.length, names.length, emails.length);
        for(let j = 0; j < maxLen; j++) {
          faculties.push({
            initial: initials[j] || '',
            name: names[j] || '',
            email: emails[j] || ''
          });
        }
        
        electiveCourses.push({
          offered: (r[1] || '').trim().toUpperCase(),
          code: r[2].trim(),
          title: (r[3] || '').trim(),
          outline: (r[4] || '').trim(),
          remarks: (r[5] || '').trim(),
          prerequisite: (r[6] || '').trim(),
          faculties: faculties
        });
      }
    }
    
    statusEl.innerHTML = '';
    renderElectives();
  } catch(e) {
    statusEl.textContent = 'Could not load elective course database. Please check your network connection.';
    statusEl.className = 'error';
    countEl.textContent = 'Failed to load.';
    console.error(e);
  }
}

function renderElectives() {
  const grid = document.getElementById('electives-grid');
  const countEl = document.getElementById('dir-count');
  const query = document.getElementById('search-input').value.trim().toLowerCase();
  
  const filtered = electiveCourses.filter(c => {
    // 1. Filter by Tab (Active vs Inactive)
    if(c.offered !== currentTab) return false;
    
    // 2. Filter by search query
    if(!query) return true;
    
    const matchCode = c.code.toLowerCase().includes(query);
    const matchTitle = c.title.toLowerCase().includes(query);
    const matchPrereq = c.prerequisite.toLowerCase().includes(query);
    const matchFaculty = c.faculties.some(f => 
      f.initial.toLowerCase().includes(query) || f.name.toLowerCase().includes(query)
    );
    
    return matchCode || matchTitle || matchPrereq || matchFaculty;
  });
  
  const label = currentTab === 'ACTIVE' ? 'active' : 'inactive';
  countEl.textContent = `${filtered.length} ${label} elective course${filtered.length !== 1 ? 's' : ''} found ${query ? 'matching search' : ''}`;
  
  if(!filtered.length) {
    grid.innerHTML = '<div class="dir-empty">No elective courses found matching criteria.</div>';
    return;
  }
  
  grid.innerHTML = filtered.map((c, i) => {
    const facultyCount = c.faculties.length;
    const prereqText = c.prerequisite ? c.prerequisite : 'None';
    
    return `
      <div class="elective-card" onclick="openDetails('${c.code.replace(/'/g, "\\'")}')">
        <div>
          <div class="card-header">
            <span class="course-code">${esc(c.code)}</span>
            <span class="status-pill ${c.offered.toLowerCase()}">${esc(c.offered)}</span>
          </div>
          <div class="course-title">${esc(c.title)}</div>
        </div>
        <div class="card-details">
          <div class="detail-item">
            <span class="detail-icon">⚙️</span>
            <span>Prerequisite: <strong>${esc(prereqText)}</strong></span>
          </div>
          <div class="detail-item">
            <span class="detail-icon">👥</span>
            <span>${facultyCount} Potential Faculty member${facultyCount !== 1 ? 's' : ''}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function openDetails(code) {
  const c = electiveCourses.find(x => x.code === code);
  if(!c) return;
  
  const modalContent = document.getElementById('modal-content');
  const prereqText = c.prerequisite ? c.prerequisite : 'None';
  const descText = COURSE_DESCRIPTIONS[c.code] || "No course description available.";
  
  // Faculty List Markup
  let facultyMarkup = '';
  if (c.faculties.length > 0) {
    facultyMarkup = `<div class="faculty-list">` + c.faculties.map(f => {
      const picUrl=FACULTY_PICS[f.initial]||'';
      const initialHtml=picUrl?`<img src="${picUrl}" alt="${esc(f.initial)}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;"/>`:esc(f.initial);
      return `
      <div class="fac-row" onclick="viewFaculty('${esc(f.initial)}')">
        <div class="fac-left">
          <div class="fac-initial">${initialHtml}</div>
          <div class="fac-name">${esc(f.name)}</div>
        </div>
        ${f.email ? `
          <a class="email-btn" href="mailto:${esc(f.email)}" title="Email ${esc(f.name)}" aria-label="Email" onclick="event.stopPropagation()">
            ✉️
          </a>
        ` : ''}
      </div>`;
    }).join('') + `</div>`;
  } else {
    facultyMarkup = `<div class="info-value empty">No specific faculty member listed for this course.</div>`;
  }
  
  // Outline Action
  let outlineMarkup = `<div class="info-value">${esc(c.outline || 'No course outline specified.')}</div>`;
  if (c.outline && c.outline.startsWith('http')) {
    outlineMarkup = `
      <div class="outline-box">
        <span class="outline-text">Click to open official course outline</span>
        <a class="outline-btn" href="${esc(c.outline)}" target="_blank">View Outline</a>
      </div>
    `;
  } else if (c.outline && c.outline === 'Email Course Faculties') {
    // Generate mailto link with all faculties
    const allEmails = c.faculties.map(f => f.email).filter(Boolean).join(',');
    const mailtoLink = allEmails ? `mailto:${allEmails}?subject=Inquiry about ${encodeURIComponent(c.code)} - ${encodeURIComponent(c.title)}` : '#';
    outlineMarkup = `
      <div class="outline-box">
        <span class="outline-text">Outline requires contacting instructors</span>
        ${allEmails ? `
          <a class="outline-btn" href="${mailtoLink}">Email Instructors</a>
        ` : `<span class="info-value empty">No faculty emails available.</span>`}
      </div>
    `;
  }

  modalContent.innerHTML = `
    <div class="modal-header">
      <div class="modal-course-badge">
        <span class="modal-course-code">${esc(c.code)}</span>
        <span class="status-pill ${c.offered.toLowerCase()}">${esc(c.offered)}</span>
      </div>
      <div class="modal-course-title">${esc(c.title)}</div>
    </div>
    <div class="modal-body">
      <div class="info-section">
        <div class="info-label">Course Description</div>
        <div class="info-value">${esc(descText)}</div>
      </div>
      <div class="info-section">
        <div class="info-label">Prerequisite</div>
        <div class="info-value"><strong>${esc(prereqText)}</strong></div>
      </div>
      
      ${c.remarks ? `
        <div class="info-section">
          <div class="info-label">Remarks</div>
          <div class="info-value">${esc(c.remarks)}</div>
        </div>
      ` : ''}
      
      <div class="info-section">
        <div class="info-label">Course Outline / Action</div>
        ${outlineMarkup}
      </div>
      
      <div class="info-section">
        <div class="info-label">Prospective Faculty Members</div>
        ${facultyMarkup}
      </div>
    </div>
  `;
  
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

// Event Listeners
document.getElementById('search-input').addEventListener('input', renderElectives);

document.getElementById('tab-active').addEventListener('click', (e) => {
  document.getElementById('tab-active').classList.add('active');
  document.getElementById('tab-inactive').classList.remove('active');
  currentTab = 'ACTIVE';
  renderElectives();
});

document.getElementById('tab-inactive').addEventListener('click', (e) => {
  document.getElementById('tab-inactive').classList.add('active');
  document.getElementById('tab-active').classList.remove('active');
  currentTab = 'INACTIVE';
  renderElectives();
});

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', e => {
  if(e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => {
  if(e.key === 'Escape') closeModal();
});

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Initial Fetch
fetchSheetData();

// Sidebar Toggle Logic
const toggleBtn = document.getElementById('sidebar-toggle');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('sidebar-overlay');
const body = document.body;

if (toggleBtn && sidebar && overlay) {
  toggleBtn.addEventListener('click', () => {
    const isMobile = window.innerWidth <= 768;
    if (isMobile) {
      const isOpen = sidebar.classList.toggle('open');
      toggleBtn.classList.toggle('open', isOpen);
      overlay.classList.toggle('show', isOpen);
    } else {
      body.classList.toggle('sidebar-collapsed');
    }
  });
  
  overlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    toggleBtn.classList.remove('open');
    overlay.classList.remove('show');
  });

  window.addEventListener('resize', () => {
    const isMobile = window.innerWidth <= 768;
    if (!isMobile) {
      sidebar.classList.remove('open');
      overlay.classList.remove('show');
    } else {
      toggleBtn.classList.remove('open');
    }
  });
}

function viewFaculty(initial) {
  window.location.href = `index.html?initial=${encodeURIComponent(initial)}`;
}
</script>
</div> <!-- Close main-wrapper-layout -->
